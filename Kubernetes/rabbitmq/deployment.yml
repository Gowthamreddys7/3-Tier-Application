apiVersion: apps/v1
kind: Deployment

metadata:
  name: rabbitmq-deployment
  namespace: three-tier

spec:
  replicas: 1

  selector:
    matchLabels:
      app: rabbitmq

  template:
    metadata:
      labels:
        app: rabbitmq

    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management

          ports:
            - containerPort: 5672
            - containerPort: 15672

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          env:
            - name: RABBITMQ_DEFAULT_USER
              value: guest

            - name: RABBITMQ_DEFAULT_PASS
              value: guest