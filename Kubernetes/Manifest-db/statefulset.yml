apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: three-statefulset
  namespace: three-tier

spec:
  serviceName: devopsdb
  replicas: 1

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers:
        - name: mysql
          image: gowthamreddy7/vprofile-db:v1
          imagePullPolicy: Always

          ports:
            - containerPort: 3306

          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql

          resources:
            requests:
              cpu: "300m"
              memory: "100Mi"
            limits:
              cpu: "500m"
              memory: "200Mi"

      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: three-pvc
